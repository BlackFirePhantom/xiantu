name: Feature Request / 功能建议
description: 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        有好的想法？欢迎提出！

  - type: textarea
    id: feature
    attributes:
      label: 功能描述
      description: 你希望加入什么功能？
      placeholder: 例如：希望加入宗门系统，可以创建和加入宗门
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 为什么需要这个功能？
      description: 这个功能能解决什么问题，或带来什么体验提升？
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: 你设想的实现方式
      description: 如果有思路，可以简单描述
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 你觉得这个功能的重要程度
      options:
        - 锦上添花
        - 比较需要
        - 非常需要
    validations:
      required: false
