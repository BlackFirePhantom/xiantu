name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile models.py
          python -m py_compile game_data.py
          python -m py_compile events.py
          python -m py_compile npc_data.py
          python -m py_compile config.py

      - name: Module syntax check
        run: |
          python -m py_compile game/utils.py
          python -m py_compile game/combat.py
          python -m py_compile game/cultivation.py
          python -m py_compile game/crafting.py
          python -m py_compile game/pet.py
          python -m py_compile game/treasure.py
          python -m py_compile game/npc.py
          python -m py_compile game/events.py
          python -m py_compile game/auction.py

      - name: Unit tests
        run: python -m pytest tests/ -v

      - name: Import test
        run: python -c "from app import app; print('Import OK')"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t xiantu-test .

      - name: Start container
        run: docker run -d --name xiantu-test -p 5000:5000 xiantu-test

      - name: Check container logs
        run: sleep 3 && docker logs xiantu-test

      - name: Wait and check
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:5000 | grep -q "仙途"; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 2
          done
          echo "FAIL"
          docker logs xiantu-test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f xiantu-test
