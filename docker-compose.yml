services:
  xiantu:
    build: .
    container_name: xiantu
    ports:
      - "8500:5000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - XIANTU_SECRET_KEY=${XIANTU_SECRET_KEY:-}
      - XIANTU_CORS=${XIANTU_CORS:-*}
      - XIANTU_PORT=5000
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
